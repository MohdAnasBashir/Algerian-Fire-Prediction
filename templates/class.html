<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasfication model</title>
    <style>
        body{
            background-image: url("/static/Wildfire forest.png");
        }
        body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.65); /* increase darkness */
        z-index: -1;
    }
     h1{
            text-align: center;
            font-size: 45px;
            font-family: 'Poppins', sans-serif;
            color: #ffcc70;
            text-shadow: 
            0 0 8px orange,
            0 0 15px red,
            2px 2px 10px rgba(0,0,0,0.7);
            margin-top: 40px;
            margin-bottom: 10px;
        }
         form{
            width: 400px;
            /* background: rgba(0, 0, 0, 0.6); */
            padding: 25px;
            border-radius: 10px;
        }
        .form-container{
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        input {
        width: 100%;
        padding: 12px;   /* increases height */
        box-sizing: border-box;
        background-color: #ffcc70;
        margin-bottom: 10px;
        box-shadow:
        0 0 5px orange,
        0 0 10px red;
        }
        select, button {
        width: 100%;
        padding: 12px;
        background-color: #ffcc70;
        margin-bottom: 10px;
         box-shadow: 
        0 0 8px orange,
        0 0 15px red;
        color:#888;  /* or #555 for softer look */
        }
        .result{
            text-align: center;
            font-size: 28px;
            margin-top: -25px;
            font-family: 'Poppins', sans-serif;
            color: #ffcc70;
            text-shadow: 
            0 0 8px orange,
            0 0 15px red,
            2px 2px 10px rgba(0,0,0,0.7);
        }
        input, select, button {
        border: none;
        outline: none;
        appearance: none;
    }
    form {
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(5px);
    }
    input, select {
        transition: all 0.2s ease;
    }
    input:focus,
    select:focus {
      color: #888;
      background-color: #4b3103;
        transform: scale(1.02);
    }
    button {
    width: 50%;
    padding: 12px;
    background: linear-gradient(45deg, #ffcc70, #ff8c00);
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    color: #222;
    transition: all 0.3s ease;
    margin: 10px auto 0;
    display: block;
    box-shadow:
        0 0 8px orange,
        0 0 15px red;
    }
    button:hover{
        cursor: pointer;
        transform: translateY(-2px) scale(1.02);
        box-shadow:
        0 0 15px orange,
        0 0 25px red;
    }
    .fwi-btn {
    width: 200px;
    margin: 15px auto;  /* centers it */
    /* width: 50%; */
    padding: 12px;
    background: linear-gradient(45deg, #ffcc70, #ff8c00);
    border: none;
    border-radius: 6px;
    font-size: 16px;
    /* white-space: nowrap; */
    font-weight: 600;
    color: #222;
    transition: all 0.3s ease;
    /* margin: 10px auto 0; */
    display: block;
    box-shadow:
        0 0 8px orange,
        0 0 15px red;
}

.fwi-btn:hover {
       cursor: pointer;
        transform: translateY(-2px) scale(1.02);
        box-shadow:
        0 0 15px orange,
        0 0 25px red;
}
a{
    text-decoration: none;
    text-align: center;
}
    </style>
</head>
<body>
    <h1>Forest Fire Prediction System</h1>
    <div class="form-container">
    <form action="{{url_for('predict_datapointclass')}}" method="post">

    <input type="number" step="any" name="Temperature"
       value="{{ data.get('Temperature','') }}"
       placeholder="Temperature" required><br>

    <input type="number" step="any" name="RH"
        value="{{ data.get('RH','') }}"
        placeholder="Relative Humidity" required><br>

    <input type="number" step="any" name="Ws"
        value="{{ data.get('Ws','') }}"
        placeholder="Wind Speed" required><br>

    <input type="number" step="any" name="Rain"
        value="{{ data.get('Rain','') }}"
        placeholder="Rain" required><br>

    <input type="number" step="any" name="FFMC"
        value="{{ data.get('FFMC','') }}"
        placeholder="FFMC" required><br>

    <input type="number" step="any" name="DMC"
        value="{{ data.get('DMC','') }}"
        placeholder="DMC" required><br>

    <input type="number" step="any" name="ISI"
        value="{{ data.get('ISI','') }}"
        placeholder="ISI" required><br>

       <select name="Region">
        <option value="0" {% if data.get('Region') == '0' %}selected{% endif %}>
            Bejaia (Northeast)
        </option>
        <option value="1" {% if data.get('Region') == '1' %}selected{% endif %}>
            Sidi Bel Abbes (Northwest)
        </option>
</select>

    <button type="submit">Predict</button>

</form>
</div>
<h2 class="result">
    Result: {{results}}
</h2>

<a href="/predictdata" class="fwi-btn"> Check FWI →</a>
</body>
</html>
